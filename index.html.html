<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HabitBuilder</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="HabitBuilder" />
<meta name="theme-color" content="#1D9E75" />
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22HabitBuilder%22%2C%22short_name%22%3A%22Habits%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231D9E75%22%2C%22theme_color%22%3A%22%231D9E75%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D%2527http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%2527%2520viewBox%3D%25270%25200%2520512%2520512%2527%253E%253Crect%2520width%3D%2527512%2527%2520height%3D%2527512%2527%2520rx%3D%2527100%2527%2520fill%3D%2527%25231D9E75%2527%2F%253E%253Ctext%2520x%3D%2527256%2527%2520y%3D%2527330%2527%2520font-size%3D%2527280%2527%2520text-anchor%3D%2527middle%2527%2520fill%3D%2527white%2527%253E%25E2%259C%2593%253C%2F%2520text%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%231D9E75'/><text x='256' y='340' font-size='300' text-anchor='middle' fill='white'>✓</text></svg>" />
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%231D9E75'/><text x='256' y='340' font-size='300' text-anchor='middle' fill='white'>✓</text></svg>" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f3; color: #111; min-height: 100vh; }
.container { max-width: 680px; margin: 0 auto; padding: 2rem 1.25rem; }
.hb-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.hb-title { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
.hb-date { font-size: 13px; color: #888; }
.summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat-card { background: #fff; border-radius: 10px; border: 1px solid #e8e8e8; padding: 12px 14px; }
.stat-label { font-size: 12px; color: #999; margin-bottom: 4px; }
.stat-val { font-size: 22px; font-weight: 600; }
.progress-bar-wrap { width: 100%; height: 5px; background: #eee; border-radius: 99px; margin-top: 6px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 99px; background: #1D9E75; transition: width 0.3s; }
.add-section { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 16px; margin-bottom: 1.5rem; }
.add-fields { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-hint { font-size: 11px; color: #999; }
input[type=text], input[type=number], select {
  padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px;
  font-size: 14px; font-family: inherit; outline: none; background: #fff; color: #111;
}
input[type=text]:focus, input[type=number]:focus, select:focus { border-color: #1D9E75; box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
input[type=number] { width: 90px; }
select { width: 120px; }
.name-input { min-width: 160px; flex: 1; }
.add-btn {
  padding: 9px 20px; border: none; border-radius: 8px;
  background: #1D9E75; color: #fff; cursor: pointer;
  font-size: 14px; font-weight: 600; font-family: inherit;
  white-space: nowrap; align-self: flex-end;
}
.add-btn:hover { background: #178a65; }
.add-btn:active { transform: scale(0.97); }
.habits-list { display: flex; flex-direction: column; gap: 10px; }
.habit-card {
  background: #fff; border: 1px solid #e8e8e8; border-radius: 12px;
  padding: 14px 16px; display: flex; align-items: center; gap: 14px;
  transition: border-color 0.2s, background 0.2s;
}
.habit-card.done { border-color: #9FE1CB; background: #f0fbf7; }
.count-ctrl { display: flex; flex-direction: column; align-items: center; gap: 5px; flex-shrink: 0; }
.count-circle {
  width: 44px; height: 44px; border-radius: 50%;
  border: 2px solid #ccc; background: #fff;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; color: #666;
  transition: all 0.15s; user-select: none; flex-shrink: 0;
}
.count-circle:hover { border-color: #1D9E75; color: #1D9E75; background: #f0fbf7; }
.habit-card.done .count-circle { background: #1D9E75; border-color: #1D9E75; color: #fff; }
.undo-btn {
  font-size: 10px; color: #aaa; cursor: pointer;
  padding: 2px 7px; border-radius: 4px;
  border: 1px solid #e8e8e8; background: #f5f5f3;
  font-family: inherit;
}
.undo-btn:hover { background: #fdecea; color: #c0392b; border-color: #f5c6c6; }
.spacer { height: 22px; }
.habit-info { flex: 1; min-width: 0; }
.habit-name { font-size: 15px; font-weight: 500; }
.goal-bar-wrap { width: 100%; height: 4px; background: #eee; border-radius: 99px; margin: 6px 0 2px; overflow: hidden; }
.goal-bar { height: 100%; border-radius: 99px; background: #1D9E75; transition: width 0.2s; }
.habit-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
.habit-cat { font-size: 11px; padding: 2px 9px; border-radius: 99px; font-weight: 600; }
.habit-count-lbl { font-size: 12px; color: #888; }
.habit-streak { font-size: 12px; color: #888; }
.week-dots { display: flex; gap: 4px; align-items: center; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: #ddd; display: inline-block; }
.dot.filled { background: #1D9E75; }
.dot.partial { background: #9FE1CB; }
.dot.today-empty { background: transparent; border: 1.5px solid #ccc; }
.del-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 15px; padding: 4px 6px; border-radius: 6px; align-self: flex-start; flex-shrink: 0; }
.del-btn:hover { color: #c0392b; background: #fdecea; }
.install-banner { display:none; background:#1D9E75; color:#fff; font-size:13px; padding:10px 16px; text-align:center; position:sticky; top:0; z-index:10; }
.install-banner span { opacity:0.85; }
.install-banner b { font-weight:600; }
.install-close { float:right; background:none; border:none; color:#fff; font-size:16px; cursor:pointer; line-height:1; padding:0 0 0 10px; }
</style>
</head>
<body>
<div class="install-banner" id="install-banner">
  <span>📲 <b>Tap Share → Add to Home Screen</b> to install as an app</span>
  <button class="install-close" id="install-close">✕</button>
</div>
<div class="container">
  <div class="hb-header">
    <span class="hb-title">HabitBuilder</span>
    <span class="hb-date" id="hb-date"></span>
  </div>

  <div class="summary">
    <div class="stat-card">
      <div class="stat-label">Today</div>
      <div class="stat-val" id="stat-today">—</div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Best streak</div>
      <div class="stat-val" id="stat-streak">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total habits</div>
      <div class="stat-val" id="stat-total">0</div>
    </div>
  </div>

  <div class="add-section">
    <div class="add-fields">
      <div class="field-group" style="flex:1;min-width:150px;">
        <span class="field-hint">Habit name</span>
        <input class="name-input" type="text" id="habit-input" placeholder="e.g. Drink water" maxlength="40" />
      </div>
      <div class="field-group">
        <span class="field-hint">Category</span>
        <select id="cat-select">
          <option value="health">Health</option>
          <option value="mind">Mind</option>
          <option value="work">Work</option>
          <option value="social">Social</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="field-group">
        <span class="field-hint">Daily goal</span>
        <input type="number" id="goal-input" min="1" max="999999" value="1" />
      </div>
      <button class="add-btn" id="add-btn">+ Add</button>
    </div>
  </div>

  <div class="habits-list" id="habits-list"></div>
</div>

<script>
(function () {
  var habits = [];

  var CAT_COLORS = {
    health: { bg: '#E1F5EE', color: '#0F6E56' },
    mind:   { bg: '#EEEDFE', color: '#3C3489' },
    work:   { bg: '#E6F1FB', color: '#0C447C' },
    social: { bg: '#FAEEDA', color: '#633806' },
    other:  { bg: '#F1EFE8', color: '#444441' }
  };

  var STORAGE_KEY = 'habitbuilder_habits';

  function saveHabits() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(habits)); } catch(e) {}
  }

  function loadHabits() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) habits = JSON.parse(raw);
    } catch(e) { habits = []; }
  }

  function todayStr() {
    var d = new Date();
    var mm = d.getMonth() + 1;
    var dd = d.getDate();
    return d.getFullYear() + '-' + (mm < 10 ? '0' + mm : mm) + '-' + (dd < 10 ? '0' + dd : dd);
  }

  function getLast7Days() {
    var days = [];
    for (var i = 6; i >= 0; i--) {
      var d = new Date();
      d.setDate(d.getDate() - i);
      var mm = d.getMonth() + 1;
      var dd = d.getDate();
      days.push(d.getFullYear() + '-' + (mm < 10 ? '0' + mm : mm) + '-' + (dd < 10 ? '0' + dd : dd));
    }
    return days;
  }

  function getCount(habit, date) {
    return habit.counts[date] || 0;
  }

  function getStreak(habit) {
    var streak = 0;
    var d = new Date();
    for (var i = 0; i < 365; i++) {
      var mm = d.getMonth() + 1;
      var dd2 = d.getDate();
      var s = d.getFullYear() + '-' + (mm < 10 ? '0' + mm : mm) + '-' + (dd2 < 10 ? '0' + dd2 : dd2);
      if (getCount(habit, s) >= habit.goal) {
        streak++;
        d.setDate(d.getDate() - 1);
      } else {
        break;
      }
    }
    return streak;
  }

  var STREAK_KEY = 'habitbuilder_beststreak';
  var STREAK_DATE_KEY = 'habitbuilder_beststreak_date';
  var bestStreak = 0;
  var bestStreakDate = '';

  function loadBestStreak() {
    try {
      bestStreak = parseInt(localStorage.getItem(STREAK_KEY), 10) || 0;
      bestStreakDate = localStorage.getItem(STREAK_DATE_KEY) || '';
    } catch(e) {}
  }

  function saveBestStreak() {
    try {
      localStorage.setItem(STREAK_KEY, bestStreak);
      localStorage.setItem(STREAK_DATE_KEY, bestStreakDate);
    } catch(e) {}
  }

  function checkAndUpdateBestStreak() {
    var today = todayStr();
    if (!habits.length) return;
    var allDone = habits.every(function(h) { return getCount(h, today) >= h.goal; });
    if (!allDone) return;
    if (bestStreakDate === today) return;
    var currentStreak = getCurrentOverallStreak();
    if (currentStreak > bestStreak) {
      bestStreak = currentStreak;
      bestStreakDate = today;
      saveBestStreak();
    }
  }

  function getCurrentOverallStreak() {
    var streak = 0;
    var d = new Date();
    for (var i = 0; i < 365; i++) {
      var mm = d.getMonth() + 1;
      var dd2 = d.getDate();
      var s = d.getFullYear() + '-' + (mm < 10 ? '0' + mm : mm) + '-' + (dd2 < 10 ? '0' + dd2 : dd2);
      var allDoneOnDay = habits.length > 0 && habits.every(function(h) { return getCount(h, s) >= h.goal; });
      if (allDoneOnDay) { streak++; d.setDate(d.getDate() - 1); }
      else break;
    }
    return streak;
  }

  function addHabit() {
    var input = document.getElementById('habit-input');
    var name = input.value.trim();
    if (!name) {
      input.focus();
      input.style.borderColor = '#e74c3c';
      setTimeout(function () { input.style.borderColor = ''; }, 1000);
      return;
    }
    var cat = document.getElementById('cat-select').value;
    var goal = parseInt(document.getElementById('goal-input').value, 10);
    if (isNaN(goal) || goal < 1) goal = 1;
    var isSteps = isStepsHabit(name);
    if (isSteps && goal === 1) goal = 10000;
    var step = isSteps ? 1000 : 1;
    habits.push({ id: Date.now(), name: name, cat: cat, goal: goal, step: step, counts: {} });
    saveHabits();
    input.value = '';
    document.getElementById('goal-input').value = 1;
    input.focus();
    render();
  }

  function increment(id) {
    var today = todayStr();
    for (var i = 0; i < habits.length; i++) {
      if (habits[i].id === id) {
        habits[i].counts[today] = (habits[i].counts[today] || 0) + (habits[i].step || 1);
        break;
      }
    }
    saveHabits();
    var allDone = habits.length > 0 && habits.every(function(h) { return getCount(h, today) >= h.goal; });
    if (allDone) checkAndUpdateBestStreak();
    render();
  }

  function decrement(id) {
    var today = todayStr();
    for (var i = 0; i < habits.length; i++) {
      if (habits[i].id === id) {
        habits[i].counts[today] = Math.max(0, (habits[i].counts[today] || 0) - (habits[i].step || 1));
        break;
      }
    }
    saveHabits();
    render();
  }

  function deleteHabit(id) {
    habits = habits.filter(function (h) { return h.id !== id; });
    saveHabits();
    render();
  }

  function isStepsHabit(name) {
    return /step|steps|walk|walking|stride|strides/i.test(name);
  }

  function escHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function render() {
    var today = todayStr();
    var days = getLast7Days();
    var total = habits.length;
    var done = habits.filter(function (h) { return getCount(h, today) >= h.goal; }).length;

    document.getElementById('stat-today').textContent = total ? (done + '/' + total) : '—';
    document.getElementById('prog-bar').style.width = total ? Math.round(done / total * 100) + '%' : '0%';
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-streak').textContent = bestStreak;

    var list = document.getElementById('habits-list');
    if (!total) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div>No habits yet — add your first one above.</div></div>';
      return;
    }

    var html = '';
    for (var i = 0; i < habits.length; i++) {
      var h = habits[i];
      var count = getCount(h, today);
      var isDone = count >= h.goal;
      var streak = getStreak(h);
      var c = CAT_COLORS[h.cat] || CAT_COLORS.other;
      var pct = Math.min(100, Math.round(count / h.goal * 100));

      var dotsHtml = '';
      for (var j = 0; j < days.length; j++) {
        var dc = getCount(h, days[j]);
        var cls = '';
        if (j === 6 && count === 0) cls = 'today-empty';
        else if (dc >= h.goal) cls = 'filled';
        else if (dc > 0) cls = 'partial';
        dotsHtml += '<span class="dot ' + cls + '"></span>';
      }

      var stepSize = h.step || 1;
      var countLabel;
      if (isDone) {
        countLabel = '&#10003;';
      } else if (stepSize >= 1000) {
        countLabel = '+' + (stepSize / 1000) + 'k';
      } else if (stepSize > 1) {
        countLabel = '+' + stepSize;
      } else {
        countLabel = '+';
      }
      function fmt(n) {
        if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n / 1000 % 1 === 0 ? n / 1000 : (n / 1000).toFixed(1)) + 'k';
        return n;
      }
      var countDisplay = fmt(count);
      var goalDisplay = fmt(h.goal);

      html += '<div class="habit-card' + (isDone ? ' done' : '') + '" data-id="' + h.id + '">';
      html += '<div class="count-ctrl">';
      html += '<div class="count-circle" data-action="inc" data-id="' + h.id + '">' + countLabel + '</div>';
      if (count > 0) {
        html += '<button class="undo-btn" data-action="dec" data-id="' + h.id + '">undo</button>';
      } else {
        html += '<span class="spacer"></span>';
      }
      html += '</div>';
      html += '<div class="habit-info">';
      html += '<div class="habit-name">' + escHtml(h.name) + '</div>';
      if (h.goal > 1 || h.step > 1) {
        html += '<div class="goal-bar-wrap"><div class="goal-bar" style="width:' + pct + '%"></div></div>';
      }
      html += '<div class="habit-meta">';
      html += '<span class="habit-cat" style="background:' + c.bg + ';color:' + c.color + '">' + h.cat + '</span>';
      if (h.goal > 1 || h.step > 1) {
        html += '<span class="habit-count-lbl">' + countDisplay + ' of ' + goalDisplay + ' today</span>';
      }
      html += '<span class="week-dots">' + dotsHtml + '</span>';
      if (streak > 0) {
        html += '<span class="habit-streak">&#128293; ' + streak + 'd</span>';
      }
      html += '</div>';
      html += '</div>';
      html += '<button class="del-btn" data-action="del" data-id="' + h.id + '">&#x2715;</button>';
      html += '</div>';
    }
    list.innerHTML = html;
  }

  document.getElementById('habits-list').addEventListener('click', function (e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var id = parseInt(el.getAttribute('data-id'), 10);
    var action = el.getAttribute('data-action');
    if (action === 'inc') increment(id);
    else if (action === 'dec') decrement(id);
    else if (action === 'del') deleteHabit(id);
  });

  document.getElementById('add-btn').addEventListener('click', addHabit);

  document.getElementById('habit-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') addHabit();
  });

  function scheduleMidnightCheck() {
    var now = new Date();
    var midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 1);
    var msUntilMidnight = midnight - now;
    setTimeout(function() {
      checkAndUpdateBestStreak();
      render();
      scheduleMidnightCheck();
    }, msUntilMidnight);
  }

  var dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  var monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  var now = new Date();
  document.getElementById('hb-date').textContent = dayNames[now.getDay()] + ', ' + monthNames[now.getMonth()] + ' ' + now.getDate();

  var isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
  var bannerDismissed = false;
  try { bannerDismissed = localStorage.getItem('hb_banner_dismissed') === '1'; } catch(e) {}
  if (isMobile && !bannerDismissed) {
    document.getElementById('install-banner').style.display = 'block';
  }
  document.getElementById('install-close').addEventListener('click', function() {
    document.getElementById('install-banner').style.display = 'none';
    try { localStorage.setItem('hb_banner_dismissed', '1'); } catch(e) {}
  });

  loadHabits();
  loadBestStreak();
  scheduleMidnightCheck();
  render();
})();
</script>
</body>
</html>
